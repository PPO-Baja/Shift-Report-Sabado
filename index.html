<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shift Report</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      padding: 16px;
      max-width: 480px;
      margin: auto;
    }
    header {
      background: #036587;
      color: #E8E8E8;
      padding: 14px 16px;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }
    header h1 { font-size: 1.2rem; letter-spacing: 1px; }
    header p  { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

    .card {
      background: white;
      border-radius: 0 0 12px 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .section { margin-bottom: 16px; }
    .section h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.8px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric label {
      font-size: 0.7rem;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .metric input,
    .metric textarea,
    .metric select {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
      background: white;
      resize: none;
    }
    .metric textarea { font-size: 0.8rem; font-weight: 400; }
    .full-width { grid-column: 1 / -1; }

    /* ── Shift Pills ── */
    .shift-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .shift-pills button {
      flex: 1 1 calc(25% - 8px);
      min-width: 70px;
      padding: 9px 4px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 0.78rem;
      font-weight: 700;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .shift-pills button.active {
      background: #036587;
      border-color: #036587;
      color: white;
    }
    .shift-pills button:hover:not(.active) {
      border-color: #036587;
      color: #036587;
    }

    /* ── Time Pills ── */
    .time-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .time-pills button {
      flex: 1 1 calc(25% - 8px);
      min-width: 60px;
      padding: 8px 4px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .time-pills button.active {
      background: #EB0A1E;
      border-color: #EB0A1E;
      color: white;
    }
    .time-pills button:hover:not(.active) {
      border-color: #EB0A1E;
      color: #EB0A1E;
    }

    .selected-time-badge {
      display: inline-block;
      background: #fff3f3;
      border: 1px solid #EB0A1E;
      color: #EB0A1E;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-top: 8px;
    }

    .btn-send {
      width: 100%;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .btn-send:active { opacity: 0.85; }

    .btn-reset {
      width: 100%;
      background: #eee;
      color: #555;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .timestamp {
      text-align: center;
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 12px;
    }
    .shift-info-badge {
      background: #eaf4f8;
      border: 1px solid #036587;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #036587;
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
      display: none;
    }
    .shift-info-badge.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>📋 SHIFT REPORT</h1>
  <p id="reportTime">Loading time...</p>
</header>

<div class="card">

  <!-- ① SHIFT -->
  <div class="section">
    <h2>🏷 Shift</h2>
    <div class="shift-pills" id="shiftPills">
      <button type="button" id="btn-morning">🌅 Morning</button>
      <button type="button" id="btn-afternoon">🌤 Afternoon</button>
      <button type="button" id="btn-night">🌙 Night</button>
      <button type="button" id="btn-saturday">📅 Saturday</button>
    </div>
    <div class="shift-info-badge" id="shiftInfoBadge"></div>
  </div>

  <!-- ② REPORT TIME -->
  <div class="section">
    <h2>🕐 Report Time</h2>
    <div class="time-pills" id="timePills">
      <p id="timePlaceholder" style="font-size:0.78rem;color:#aaa;">
        ← Select a shift first
      </p>
    </div>
    <div style="text-align:center">
      <span class="selected-time-badge" id="selectedTimeBadge">Not selected</span>
    </div>
  </div>

  <!-- ③ REPORT TYPE -->
  <div class="section">
    <h2>📌 Report Type</h2>
    <div class="metric">
      <label>Title</label>
      <select id="reportTitle">
        <option value="Final">Final</option>
        <option value="Trim">Trim</option>
        <option value="Chassis">Chassis</option>
        <option value="Engines">Engines</option>
        <option value="Doors">Doors</option>
      </select>
    </div>
  </div>

  <!-- ④ PRODUCTION -->
  <div class="section">
    <h2>🏭 Production</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Produced</label>
        <input type="number" id="produced" value="0" min="0" />
      </div>
      <div class="metric">
        <label>Target</label>
        <input type="number" id="target" readonly />
      </div>
      <div class="metric">
        <label>Buffer UB2</label>
        <input type="number" id="buffer" value="0" min="0" />
      </div>
    </div>
    <div id="productionStatus"
         style="margin-top:10px;padding:12px;border-radius:8px;
                background:#f5f5f5;font-weight:bold;text-align:center;color:#888;">
      Select a shift &amp; time
    </div>
  </div>

  <!-- ⑤ KPIs -->
  <div class="section">
    <h2>📊 KPIs</h2>
    <div class="grid-2">
      <div class="metric">
        <label>OR (%)</label>
        <input type="number" id="or" readonly step="0.1" />
      </div>
      <div class="metric">
        <label>DRR (%)</label>
        <input type="number" id="drr" value="0" step="0.1" min="0" max="100" />
      </div>
    </div>
  </div>

  <!-- ⑥ OFFLINE -->
  <div class="section">
    <h2>🔴 Offline</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Offline Quantity</label>
        <input type="number" id="offlineCount" value="0" min="0" />
      </div>
      <div class="metric full-width">
        <label>Detail (one reason per line)</label>
        <textarea id="offlineDetail" rows="7"></textarea>
      </div>
    </div>
  </div>

  <!-- ⑦ STOPS & DELAYS -->
  <div class="section">
    <h2>⏱ Stops &amp; Delays</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Work Delay</label>
        <input type="text" id="workDelay" value="0" />
      </div>
      <div class="metric">
        <label>Short Stop</label>
        <input type="text" id="shortStop" value="0" />
      </div>
      <div class="metric">
        <label>Full Stop</label>
        <input type="text" id="fullStop" value="0" />
      </div>
      <div class="metric">
        <label>Part Short</label>
        <input type="text" id="partShort" value="0" />
      </div>
    </div>
  </div>

  <!-- ⑧ EQUIPMENT -->
  <div class="section">
    <h2>🔧 Equipment</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Time</label>
        <input type="text" id="equipTime" value="0" />
      </div>
      <div class="metric full-width">
        <label>Detail</label>
        <textarea id="equipDetail" rows="4"></textarea>
      </div>
    </div>
  </div>

  <!-- ⑨ BUTTONS -->
  <button class="btn-send" id="btnSend">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15
               -.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075
               -.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059
               -.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52
               .149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52
               -.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51
               -.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372
               -.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074
               .149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625
               .712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413
               .248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.849L.057 23.5
               l5.797-1.47A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
    </svg>
    Send via WhatsApp
  </button>
  <button class="btn-reset" id="btnReset">🔄 Clear / Reset</button>
  <p class="timestamp" id="genTimestamp"></p>

</div><!-- /.card -->

<script>
/* ═══════════════════════════════════════════
   SHIFT PLANS
   Each key  → checkpoint label shown on pill
   target    → planned units at that checkpoint
   minutes   → elapsed productive minutes
═══════════════════════════════════════════ */
var SHIFTS = {
  morning: {
    label: '🌅 Morning',
    hours: '6:30 AM – 3:00 PM',
    totalUnits: 201,
    plan: {
      '07:30 AM': { target: 15,  minutes: 30  },
      '08:30 AM': { target: 47,  minutes: 90  },
      '09:30 AM': { target: 74,  minutes: 140 },
      '10:30 AM': { target: 101, minutes: 200 },
      '11:30 AM': { target: 122, minutes: 230 },
      '12:30 PM': { target: 153, minutes: 290 },
      '01:30 PM': { target: 180, minutes: 340 },
      '02:30 PM': { target: 201, minutes: 400 }
    }
  },
  afternoon: {
    label: '🌤 Afternoon',
    hours: '3:30 PM – 12:00 AM',
    totalUnits: 201,
    plan: {
      '04:30 PM': { target: 15,  minutes: 30  },
      '05:30 PM': { target: 47,  minutes: 90  },
      '06:30 PM': { target: 74,  minutes: 140 },
      '07:30 PM': { target: 101, minutes: 200 },
      '08:30 PM': { target: 122, minutes: 230 },
      '09:30 PM': { target: 153, minutes: 290 },
      '10:30 PM': { target: 180, minutes: 340 },
      '11:30 PM': { target: 201, minutes: 400 }
    }
  },
  night: {
    label: '🌙 Night',
    hours: '11:00 PM – 7:30 AM',
    totalUnits: 201,
    plan: {
      '11:30 PM': { target: 15,  minutes: 30  },
      '12:30 AM': { target: 47,  minutes: 90  },
      '01:30 AM': { target: 74,  minutes: 140 },
      '02:30 AM': { target: 101, minutes: 200 },
      '03:30 AM': { target: 122, minutes: 230 },
      '04:30 AM': { target: 153, minutes: 290 },
      '05:30 AM': { target: 180, minutes: 340 },
      '06:30 AM': { target: 201, minutes: 400 }
    }
  },
  saturday: {
    label: '📅 Saturday',
    hours: '6:30 AM – 1:00 PM (OT)',
    totalUnits: 120,
    plan: {
      '07:30 AM': { target: 15,  minutes: 30  },
      '08:30 AM': { target: 40,  minutes: 90  },
      '09:30 AM': { target: 65,  minutes: 140 },
      '10:30 AM': { target: 85,  minutes: 200 },
      '11:30 AM': { target: 100, minutes: 230 },
      '12:30 PM': { target: 120, minutes: 290 }
    }
  }
};

/* ── State ── */
var currentShift = null;
var selectedTime  = '';

/* ══════════════════════════════════════════
   INIT — runs after full DOM is ready
══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function () {

  /* Wire shift buttons individually by ID */
  document.getElementById('btn-morning')
    .addEventListener('click', function () { selectShift('morning', this); });
  document.getElementById('btn-afternoon')
    .addEventListener('click', function () { selectShift('afternoon', this); });
  document.getElementById('btn-night')
    .addEventListener('click', function () { selectShift('night', this); });
  document.getElementById('btn-saturday')
    .addEventListener('click', function () { selectShift('saturday', this); });

  /* Send / Reset */
  document.getElementById('btnSend')
    .addEventListener('click', sendToWhatsApp);
  document.getElementById('btnReset')
    .addEventListener('click', resetForm);

  /* Live recalc */
  document.getElementById('produced')
    .addEventListener('input', calculateKPIs);

  /* Clock */
  updateClock();
  setInterval(updateClock, 10000);
});

/* ══════════════════════════════════════════
   SHIFT SELECTION
══════════════════════════════════════════ */
function selectShift(shiftKey, btn) {
  /* 1. Highlight selected shift button */
  var shiftBtns = document.querySelectorAll('#shiftPills button');
  for (var i = 0; i < shiftBtns.length; i++) {
    shiftBtns[i].classList.remove('active');
  }
  btn.classList.add('active');

  /* 2. Update state */
  currentShift = SHIFTS[shiftKey];
  selectedTime  = '';

  /* 3. Info badge */
  var badge = document.getElementById('shiftInfoBadge');
  badge.textContent =
    currentShift.label + '  ·  ' +
    currentShift.hours + '  ·  Plan: ' +
    currentShift.totalUnits + ' units';
  badge.classList.add('visible');

  /* 4. Rebuild time pills */
  buildTimePills();

  /* 5. Reset downstream */
  updateBadge();
  resetProductionStatus();
  document.getElementById('target').value = '';
  document.getElementById('or').value     = '';
}

/* ══════════════════════════════════════════
   TIME PILLS
══════════════════════════════════════════ */
function buildTimePills() {
  var container   = document.getElementById('timePills');
  container.innerHTML = '';

  if (!currentShift) {
    container.innerHTML =
      '<p id="timePlaceholder" style="font-size:0.78rem;color:#aaa;">' +
      '← Select a shift first</p>';
    return;
  }

  var hours = Object.keys(currentShift.plan);
  for (var i = 0; i < hours.length; i++) {
    (function (h) {
      var btn = document.createElement('button');
      btn.type        = 'button';
      btn.textContent = h;
      btn.addEventListener('click', function () {
        selectTimePill(this, h);
      });
      container.appendChild(btn);
    })(hours[i]);
  }
}

function selectTimePill(btn, value) {
  var pills = document.querySelectorAll('#timePills button');
  for (var i = 0; i < pills.length; i++) {
    pills[i].classList.remove('active');
  }
  btn.classList.add('active');
  selectedTime = value;
  updateBadge();
  calculateKPIs();
}

function updateBadge() {
  document.getElementById('selectedTimeBadge').textContent =
    selectedTime ? '⏰ ' + selectedTime : 'Not selected';
}

/* ══════════════════════════════════════════
   KPI CALCULATION
══════════════════════════════════════════ */
function calculateKPIs() {
  if (!selectedTime || !currentShift) return;

  var checkpoint = currentShift.plan[selectedTime];
  if (!checkpoint) return;

  var produced = Number(document.getElementById('produced').value) || 0;
  var target   = checkpoint.target;
  var minutes  = checkpoint.minutes;

  document.getElementById('target').value = target;

  var or = minutes > 0 ? ((produced * 1.8833) / minutes) * 100 : 0;
  document.getElementById('or').value = or.toFixed(1);

  var diff = produced - target;
  var pct  = target > 0 ? Math.round((produced / target) * 100) : 0;

  var statusEl = document.getElementById('productionStatus');
  var color = '#c62828', icon = '🔴';
  if (pct >= 100) { color = '#2e7d32'; icon = '🟢'; }
  else if (pct >= 95) { color = '#ef6c00'; icon = '🟠'; }

  statusEl.style.color = color;
  statusEl.innerHTML   =
    icon + ' ' + produced + ' of ' + target +
    ' (' + (diff >= 0 ? '+' : '') + diff +
    ' vs Plan · ' + pct + '%)';
}

function resetProductionStatus() {
  var el = document.getElementById('productionStatus');
  el.innerHTML   = 'Select a shift &amp; time';
  el.style.color = '#888';
}

/* ══════════════════════════════════════════
   VALUE HELPER
══════════════════════════════════════════ */
function v(id) {
  return document.getElementById(id).value.trim();
}

/* ══════════════════════════════════════════
   BUILD WHATSAPP MESSAGE
══════════════════════════════════════════ */
function buildMessage() {
  if (!currentShift) { alert('Select a shift first.');   return null; }
  if (!selectedTime)  { alert('Select the report time.'); return null; }

  var produced = Number(v('produced')) || 0;
  var target   = Number(v('target'))   || 0;
  var diff     = produced - target;
  var pct      = target > 0 ? Math.round((produced / target) * 100) : 0;

  function fmtLines(text) {
    return text.split('
')
      .filter(function (x) { return x.trim(); })
      .map(function (x)    { return '- ' + x.trim(); })
      .join('
');
  }

  var offline = fmtLines(v('offlineDetail')) || '- N/A';
  var equip   = fmtLines(v('equipDetail'))   || '- N/A';

  return (
    v('reportTitle') + ' Report — ' +
    currentShift.label + ' (' + currentShift.hours + ')
' +
    'Final numbers at ' + selectedTime + '

' +
    produced + ' of ' + target +
    ' (' + (diff >= 0 ? '+' : '') + diff +
    ' vs Plan · ' + pct + '%)

' +
    'Buffer UB2: ' + v('buffer') + '

' +
    'OR:  ' + v('or')  + '%
' +
    'DRR: ' + v('drr') + '%

' +
    'Offline: ' + v('offlineCount') + '
' + offline + '

' +
    'Work Delay: ' + v('workDelay')  + '
' +
    'Short Stop: ' + v('shortStop')  + '
' +
    'Full Stop:  ' + v('fullStop')   + '
' +
    'Part Short: ' + v('partShort')  + '

' +
    'Equipment: ' + v('equipTime') + '
' + equip
  );
}

/* ══════════════════════════════════════════
   SEND
══════════════════════════════════════════ */
function sendToWhatsApp() {
  var msg = buildMessage();
  if (!msg) return;
  document.getElementById('genTimestamp').textContent =
    '✅ Generated: ' + new Date().toLocaleTimeString();
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

/* ══════════════════════════════════════════
   RESET
══════════════════════════════════════════ */
var NUMERIC_IDS = [
  'produced', 'buffer', 'offlineCount',
  'workDelay', 'shortStop', 'fullStop',
  'partShort', 'equipTime', 'drr'
];

function resetForm() {
  if (!confirm('Clear all fields?')) return;

  currentShift = null;
  selectedTime  = '';

  /* Shift pills */
  var sBtns = document.querySelectorAll('#shiftPills button');
  for (var i = 0; i < sBtns.length; i++) {
    sBtns[i].classList.remove('active');
  }
  document.getElementById('shiftInfoBadge').classList.remove('visible');

  /* Time pills */
  buildTimePills();
  updateBadge();
  resetProductionStatus();

  /* Numeric → "0" */
  for (var j = 0; j < NUMERIC_IDS.length; j++) {
    document.getElementById(NUMERIC_IDS[j]).value = '0';
  }

  /* Computed read-only */
  document.getElementById('target').value = '';
  document.getElementById('or').value     = '';

  /* Select */
  document.getElementById('reportTitle').value = 'Final';

  /* Textareas */
  document.getElementById('offlineDetail').value = '';
  document.getElementById('equipDetail').value   = '';

  document.getElementById('genTimestamp').textContent = '';
}

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function updateClock() {
  document.getElementById('reportTime').textContent =
    new Date().toLocaleString('es-MX', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
}
</script>

</body>
</html>
