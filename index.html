<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shift Report</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      padding: 16px;
      max-width: 480px;
      margin: auto;
    }
    header {
      background: #036587;
      color: #E8E8E8;
      padding: 14px 16px;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }
    header h1 { font-size: 1.2rem; letter-spacing: 1px; }
    header p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
    .card {
      background: white;
      border-radius: 0 0 12px 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .section { margin-bottom: 16px; }
    .section h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.8px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric label {
      font-size: 0.7rem;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .metric input,
    .metric textarea,
    .metric select {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
      background: white;
      resize: none;
    }
    .metric textarea { font-size: 0.8rem; font-weight: 400; }
    .full-width { grid-column: 1 / -1; }

    .time-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .time-pills button {
      flex: 1 1 calc(25% - 8px);
      min-width: 60px;
      padding: 8px 4px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
    }
    .time-pills button.active {
      background: #EB0A1E;
      border-color: #EB0A1E;
      color: white;
    }
    .time-pills button:hover:not(.active) {
      border-color: #EB0A1E;
      color: #EB0A1E;
    }
    .custom-time-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .custom-time-row label {
      font-size: 0.72rem;
      color: #888;
      white-space: nowrap;
    }
    .custom-time-row input[type="time"] {
      flex: 1;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a1a;
      background: white;
    }
    .custom-time-row input[type="time"]:focus {
      outline: none;
      border-color: #EB0A1E;
    }
    .btn-send {
      width: 100%;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .btn-send:active { opacity: 0.85; }
    .btn-reset {
      width: 100%;
      background: #eee;
      color: #555;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .timestamp {
      text-align: center;
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 12px;
    }
    .selected-time-badge {
      display: inline-block;
      background: #fff3f3;
      border: 1px solid #EB0A1E;
      color: #EB0A1E;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 SHIFT REPORT</h1>
  <p id="reportTime">Loading time...</p>
</header>

<div class="card">

  <!-- SHIFT SELECTOR -->
  <div class="section">
    <h2>🔄 Shift</h2>
    <div class="metric">
      <label>Select Shift</label>
      <select id="shiftSelector">
        <option value="Turno 1">Shift 1 (6:00 AM - 1:50 PM)</option>
        <option value="Turno 2">Shift 2 (1:50 PM - 10:30 PM)</option>
        <option value="Turno 3" selected>Shift 3 (10:30 PM - 6:00 AM)</option>
        <option value="Turno 4">Shift 4 — Saturday (6:00 AM - 4:06 PM)</option>
      </select>
    </div>
  </div>

  <!-- REPORT TIME -->
  <div class="section">
    <h2>🕐 Report Time</h2>
    <div class="time-pills" id="timePills"></div>
    <div class="custom-time-row">
      <label>Custom:</label>
      <input type="time" id="customTime" />
    </div>
    <div style="text-align:center">
      <span class="selected-time-badge" id="selectedTimeBadge">Not selected</span>
    </div>
  </div>

  <!-- TITLE -->
  <div class="section">
    <h2>📌 Report Type</h2>
    <div class="metric">
      <label>Title</label>
      <select id="reportTitle">
        <option value="Final">Final</option>
        <option value="Hourly">Trim</option>
        <option value="Mid-Shift">Chassis</option>
        <option value="Start of Shift">Engines</option>
        <option value="End of Shift">Doors</option>
      </select>
    </div>
  </div>

  <!-- PRODUCTION -->
  <div class="section">
    <h2>🏭 Production</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Produced</label>
        <input type="number" id="produced" value="0" min="0" />
      </div>
      <div class="metric">
        <label>Target</label>
        <input type="number" id="target" readonly />
      </div>
      <div class="metric">
        <label>Buffer UB2</label>
        <input type="number" id="buffer" value="0" min="0" />
      </div>
    </div>
    <div id="productionStatus" style="margin-top:10px;padding:12px;border-radius:8px;background:#f5f5f5;font-weight:bold;text-align:center;">Select a time</div>
  </div>

  <!-- KPIs -->
  <div class="section">
    <h2>📊 KPIs</h2>
    <div class="grid-2">
      <div class="metric">
        <label>OR (%)</label>
        <input type="number" id="or" readonly step="0.1" />
      </div>
      <div class="metric">
        <label>DRR (%)</label>
        <input type="number" id="drr" value="0" step="0.1" min="0" max="100" />
      </div>
    </div>
  </div>

  <!-- OFFLINE -->
  <div class="section">
    <h2>🔴 Offline</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Offline Quantity</label>
        <input type="number" id="offlineCount" value="0" min="0" />
      </div>
      <div class="metric full-width">
        <label>Detail (one reason per line)</label>
        <textarea id="offlineDetail" rows="7"> </textarea>
      </div>
    </div>
  </div>

  <!-- STOPS AND DELAYS -->
  <div class="section">
    <h2>⏱ Stops &amp; Delays</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Work Delay</label>
        <input type="text" id="workDelay" value="0" placeholder="0" />
      </div>
      <div class="metric">
        <label>Short Stop</label>
        <input type="text" id="shortStop" value="0" min="0" />
      </div>
      <div class="metric">
        <label>Full Stop</label>
        <input type="text" id="fullStop" value="0" min="0" />
      </div>
      <div class="metric">
        <label>Part Short</label>
        <input type="text" id="partShort" value="0" min="0" />
      </div>
    </div>
  </div>

  <!-- EQUIPMENT -->
  <div class="section">
    <h2>🔧 Equipment</h2>
    <div class="grid-2">
      <div class="metric">
        <label>Time</label>
        <input type="text" id="equipTime" value='0' />
      </div>
      <div class="metric full-width">
        <label>Detail</label>
        <textarea id="equipDetail" rows="4"> </textarea>
      </div>
    </div>
  </div>

  <!-- BUTTONS -->
  <button class="btn-send" id="btnSend">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15
               -.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075
               -.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059
               -.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52
               .149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52
               -.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51
               -.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372
               -.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074
               .149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625
               .712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413
               .248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.849L.057 23.5
               l5.797-1.47A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
    </svg>
    Send via WhatsApp
  </button>

  <button class="btn-reset" id="btnReset">🔄 Clear / Reset</button>

  <p class="timestamp" id="genTimestamp"></p>
</div>

<script>
// ==========================================
// DEFINICIÓN DE TURNOS
// ==========================================
const shifts = {
  'Turno 1': {
    name: 'Shift 1',
    start: '6:00 AM',
    end: '1:50 PM',
    orFactor: 1.8833,
    productionPlan: {
      '06:00 AM': { target: 0,   minutes: 0 },
      '07:00 AM': { target: 27,  minutes: 60 },
      '08:00 AM': { target: 54,  minutes: 120 },
      '09:00 AM': { target: 74,  minutes: 170 },
      '10:00 AM': { target: 101, minutes: 230 },
      '11:00 AM': { target: 128, minutes: 290 },
      '12:00 PM': { target: 155, minutes: 350 },
      '01:00 PM': { target: 180, minutes: 400 },
      '01:50 PM': { target: 201, minutes: 470 }
    }
  },
  'Turno 2': {
    name: 'Shift 2',
    start: '1:50 PM',
    end: '10:30 PM',
    orFactor: 1.8833,
    productionPlan: {
      '01:50 PM': { target: 0,   minutes: 0 },
      '03:00 PM': { target: 27,  minutes: 70 },
      '04:00 PM': { target: 54,  minutes: 130 },
      '05:00 PM': { target: 74,  minutes: 180 },
      '06:00 PM': { target: 101, minutes: 240 },
      '07:00 PM': { target: 128, minutes: 300 },
      '08:00 PM': { target: 155, minutes: 360 },
      '09:00 PM': { target: 180, minutes: 420 },
      '10:30 PM': { target: 201, minutes: 520 }
    }
  },
  'Turno 3': {
    name: 'Shift 3',
    start: '10:30 PM',
    end: '6:00 AM',
    orFactor: 1.8833,
    productionPlan: {
      '11:00 PM': { target: 15,  minutes: 30 },
      '12:00 AM': { target: 47,  minutes: 90 },
      '01:00 AM': { target: 74,  minutes: 140 },
      '02:00 AM': { target: 101, minutes: 200 },
      '03:00 AM': { target: 122, minutes: 230 },
      '04:00 AM': { target: 153, minutes: 290 },
      '05:00 AM': { target: 180, minutes: 340 },
      '06:00 AM': { target: 201, minutes: 400 }
    }
  },
  'Turno 4': {
    name: 'Shift 4 (Saturday)',
    start: '6:00 AM',
    end: '4:06 PM',
    orFactor: 1.8833,
    productionPlan: {
      '06:00 AM': { target: 0,   minutes: 0 },
      '07:00 AM': { target: 27,  minutes: 60 },
      '08:00 AM': { target: 54,  minutes: 120 },
      '09:00 AM': { target: 74,  minutes: 170 },
      '10:00 AM': { target: 101, minutes: 230 },
      '11:00 AM': { target: 128, minutes: 290 },
      '12:00 PM': { target: 155, minutes: 350 },
      '01:00 PM': { target: 180, minutes: 400 },
      '02:00 PM': { target: 201, minutes: 460 },
      '03:00 PM': { target: 220, minutes: 520 },
      '04:06 PM': { target: 240, minutes: 606 }
    }
  }
};

let selectedShift = 'Turno 3';
let selectedTime = '';

function getCurrentPlan() {
  return shifts[selectedShift].productionPlan;
}

function calculateKPIs() {
  const plan = getCurrentPlan();
  if (!selectedTime || !plan[selectedTime]) return;

  const produced = Number(document.getElementById('produced').value) || 0;
  const target = plan[selectedTime].target;
  const minutes = plan[selectedTime].minutes;
  const orFactor = shifts[selectedShift].orFactor;

  document.getElementById('target').value = target;

  const diff = produced - target;
  const pct = target > 0 ? Math.round((produced / target) * 100) : 0;
  const or = minutes > 0 ? ((produced * orFactor) / minutes) * 100 : 0;

  document.getElementById('or').value = or.toFixed(1);

  const status = document.getElementById('productionStatus');
  if(status){
    let color='#c62828', icon='🔴';
    if(pct >= 100){ color='#2e7d32'; icon='🟢'; }
    else if(pct >= 95){ color='#ef6c00'; icon='🟠'; }

    status.style.color=color;
    status.innerHTML=`${icon} ${produced} of ${target} (${diff>=0?'+':''}${diff} vs ${pct}%)`;
  }
}

function buildPills(){
 const container=document.getElementById('timePills');
 container.innerHTML='';
 Object.keys(getCurrentPlan()).forEach(h=>{
   const btn=document.createElement('button');
   btn.type='button';
   btn.textContent=h;
   btn.onclick=()=>selectPill(btn,h);
   container.appendChild(btn);
 });
}

function selectPill(btn,value){
 document.querySelectorAll('#timePills button').forEach(b=>b.classList.remove('active'));
 document.getElementById('customTime').value='';
 btn.classList.add('active');
 selectedTime=value;
 updateBadge();
 calculateKPIs();
}

function updateBadge(){
 document.getElementById('selectedTimeBadge').textContent =
   selectedTime ? '⏰ '+selectedTime : 'Not selected';
}

function onCustomTimeChange(){
 const val=document.getElementById('customTime').value;
 if(!val) return;
 document.querySelectorAll('#timePills button').forEach(b=>b.classList.remove('active'));
 const [hh,mm]=val.split(':');
 const h=Number(hh);
 selectedTime=((h%12)||12)+':'+mm.padStart(2,'0')+' '+(h>=12?'PM':'AM');
 updateBadge();
 calculateKPIs();
}

function updateClock(){
 document.getElementById('reportTime').textContent =
 new Date().toLocaleString('es-MX',{
   weekday:'short',month:'short',day:'numeric',
   hour:'2-digit',minute:'2-digit'
 });
}

function v(id){
 return document.getElementById(id).value.trim();
}

function buildMessage(){
 if(!selectedTime){
   alert('Select the report time.');
   return null;
 }

 const produced=Number(v('produced'))||0;
 const target=Number(v('target'))||0;
 const diff=produced-target;
 const pct=target>0?Math.round((produced/target)*100):0;

 const offline=v('offlineDetail')
   .split('
')
   .filter(x=>x.trim())
   .map(x=>'- '+x.trim())
   .join('
');

 const equip=v('equipDetail')
   .split('
')
   .filter(x=>x.trim())
   .map(x=>'- '+x.trim())
   .join('
');

 return `${v('reportTitle')}
Final numbers at ${selectedTime}
${shifts[selectedShift].name}

${produced} of ${target} (${diff>=0?'+':''}${diff} vs Plan)

Buffer UB2: ${v('buffer')}

OR: ${v('or')}%
DRR: ${v('drr')}%

Offline: ${v('offlineCount')}
${offline}

Work delay: ${v('workDelay')}

Short Stop: ${v('shortStop')}

Full Stop: ${v('fullStop')}

Part Short: ${v('partShort')}

Equipment: ${v('equipTime')}
${equip}`;
}

function sendToWhatsApp(){
 const msg=buildMessage();
 if(!msg) return;

 document.getElementById('genTimestamp').textContent =
 '✅ Generated: '+new Date().toLocaleTimeString();

 window.open(
   'https://wa.me/?text='+encodeURIComponent(msg),
   '_blank'
 );
}

function resetForm(){
 if(!confirm('Clear all fields?')) return;

 selectedTime='';
 updateBadge();

 document.querySelectorAll('#timePills button').forEach(b=>b.classList.remove('active'));

 document.querySelectorAll('input').forEach(el=>{
   if(el.type==='time') el.value='';
   else el.value='';
 });

 document.querySelectorAll('textarea').forEach(el=>el.value='');

 document.getElementById('reportTitle').value='Final';
 document.getElementById('genTimestamp').textContent='';
 document.getElementById('productionStatus').innerHTML='Select a time';
 document.getElementById('productionStatus').style.color='';
}

// ==========================================
// EVENTO CAMBIO DE TURNO
// ==========================================
document.getElementById('shiftSelector').addEventListener('change', function() {
  selectedShift = this.value;
  selectedTime = '';
  updateBadge();
  buildPills();
  document.getElementById('target').value = '';
  document.getElementById('or').value = '';
  document.getElementById('productionStatus').innerHTML = 'Select a time';
  document.getElementById('productionStatus').style.color = '';
});

// ==========================================
// INICIALIZACIÓN
// ==========================================
buildPills();
updateClock();
setInterval(updateClock,10000);

document.getElementById('customTime').addEventListener('change',onCustomTimeChange);
document.getElementById('btnSend').addEventListener('click',sendToWhatsApp);
document.getElementById('btnReset').addEventListener('click',resetForm);
document.getElementById('produced').addEventListener('input',calculateKPIs);
</script>

</body>
</html>
